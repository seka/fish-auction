name: 'Setup Backend'
description: 'Setup Go environment and install dependencies (caller must run actions/checkout first)'
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: backend/go.mod
        cache-dependency-path: backend/go.sum
    - name: Install dependencies
      run: go mod download
      shell: bash
      working-directory: backend
