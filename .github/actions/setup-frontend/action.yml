name: 'Setup Frontend'
description: 'Checkout code and setup Node.js environment'
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm install
      shell: bash
      working-directory: frontend
