name: 'Setup Frontend'
description: 'Setup Node.js environment and install dependencies (caller must run actions/checkout first)'
runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25'
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock
    - name: Install dependencies
      run: yarn install --frozen-lockfile
      shell: bash
      working-directory: frontend
