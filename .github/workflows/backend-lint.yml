name: Backend Lint

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-lint.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1
          working-directory: backend
          args: --timeout=5m
