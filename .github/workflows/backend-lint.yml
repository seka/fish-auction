name: Backend Lint

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-lint.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-lint.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend

      - name: Run golangci-lint
        run: go tool golangci-lint run --timeout=5m
        working-directory: backend
