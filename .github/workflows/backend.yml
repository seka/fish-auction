name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fish_auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download
        working-directory: backend

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
        env:
          PGPASSWORD: postgres

      - name: Run migrations
        run: psql -h localhost -U postgres -d fish_auction -f migrations/001_init.sql
        working-directory: backend
        env:
          PGPASSWORD: postgres

      - name: Run unit tests
        run: go test -v ./...
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: fish_auction
          DB_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RUN_INTEGRATION_TESTS: "false"
          RUN_STRESS_TESTS: "false"

      - name: Run integration tests
        run: |
          go test -v ./cmd/testing -run 'TestServerIntegration'
          go test -v ./internal/infrastructure/datastore/postgres -run 'TestItemStore_FindByID_IncludesHighestBid|TestItemStore_FindByID_NoBids'
          go test -v ./internal/infrastructure/datastore/postgres -run 'TestVenueStore_Delete_Conflict_Integration'
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: fish_auction
          DB_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RUN_INTEGRATION_TESTS: "true"
          RUN_STRESS_TESTS: "false"
