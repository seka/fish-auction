name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fish_auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: go mod download
        working-directory: backend

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
        env:
          PGPASSWORD: postgres

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.2
        with:
          image-tag: "latest"
          install-awslocal: "true"
          use-pro: "true"
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Setup LocalStack resources
        run: bash backend/scripts/init.saws.sh

      - name: Run migrations
        run: |
          for f in $(ls migrations/*.up.sql | sort); do
            psql -h localhost -U postgres -d fish_auction -f "$f"
          done
        working-directory: backend
        env:
          PGPASSWORD: postgres

      - name: Run unit tests
        run: go test -v ./...
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fish_auction
          POSTGRES_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RUN_INTEGRATION_TESTS: "false"
          RUN_STRESS_TESTS: "false"

      - name: Run integration tests
        run: |
          go test -v ./cmd/testing -run 'TestServerIntegration'
          go test -v ./internal/infrastructure/datastore/postgres -run 'TestItemStore_FindByID_IncludesHighestBid|TestItemStore_FindByID_NoBids'
          go test -v ./internal/infrastructure/datastore/postgres -run 'TestVenueStore_Delete_Conflict_Integration'
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fish_auction
          POSTGRES_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RUN_INTEGRATION_TESTS: "true"
          RUN_STRESS_TESTS: "false"
          SQS_QUEUE_URL: "http://localhost:4566/000000000000/notification-queue"
          SQS_REGION: ap-northeast-1
          SQS_ENDPOINT: "http://localhost:4566"
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: ap-northeast-1
          AWS_REGION: ap-northeast-1
