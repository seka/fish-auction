name: Frontend Lint

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-lint.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-lint.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-frontend

      - name: Run lint
        run: yarn lint
        working-directory: frontend

      - name: Run format check
        run: yarn format:check
        working-directory: frontend

      - name: Run typecheck
        run: yarn typecheck
        working-directory: frontend
