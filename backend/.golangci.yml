version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - gocritic
    - bodyclose
    - noctx
    - copyloopvar
    - misspell
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: empty-block
          disabled: true
        - name: unused-parameter
          disabled: false
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - ifElseChain
        - appendAssign
    misspell:
      locale: US
  exclusions:
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters: [revive]
        text: "exported"
      - linters: [gocritic]
        text: "commentedOutCode"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
