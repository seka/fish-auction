version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - gocritic
    - bodyclose
    - noctx
    - copyloopvar
    - misspell
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: empty-block
          disabled: true
        - name: unused-parameter
          disabled: false
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - ifElseChain
        - appendAssign
    misspell:
      locale: US

issues:
  exclude-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - linters: [revive]
      text: "exported"
    - linters: [gocritic]
      text: "commentedOutCode"
